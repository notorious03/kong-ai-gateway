# Kong 실행 환경 설정
database = off
declarative_config = /kong/kong.yaml

# 네트워크
proxy_listen = 0.0.0.0:8000
admin_listen = 0.0.0.0:8001

# 로그
proxy_access_log = /usr/local/kong/logs/access.log
proxy_error_log = /usr/local/kong/logs/error.log
admin_access_log = /usr/local/kong/logs/admin_access.log
admin_error_log = /usr/local/kong/logs/admin_error.log
log_level = info

# AI 플러그인 활성화
plugins = bundled,ai-proxy,ai-prompt-guard,ai-mcp-proxy,ai-request-transformer,key-auth,rate-limiting,file-log,request-transformer
