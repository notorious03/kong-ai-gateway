<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 680" width="860" height="680" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="kongGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#152e4d"/>
    </linearGradient>
    <linearGradient id="guardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a2a"/>
      <stop offset="100%" stop-color="#122b1e"/>
    </linearGradient>
    <linearGradient id="bedrockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b1f5c"/>
      <stop offset="100%" stop-color="#2a1445"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2940"/>
      <stop offset="100%" stop-color="#141e30"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6e7681"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="680" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" fill="#c9d1d9" font-size="16" font-weight="700">Kong AI Gateway — 시스템 아키텍처</text>
  <text x="430" y="56" text-anchor="middle" fill="#6e7681" font-size="12">AWS ECS Fargate · Kong AI Gateway · AI Guardrails · AWS Bedrock</text>

  <!-- ── 외부 클라이언트 영역 ── -->
  <rect x="40" y="72" width="780" height="100" rx="10" fill="none" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="56" y="90" fill="#6e7681" font-size="11">기업 내부 환경</text>

  <!-- Claude Code box -->
  <rect x="260" y="96" width="340" height="60" rx="8" fill="url(#clientGrad)" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="430" y="121" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="700">Claude Code</text>
  <text x="430" y="139" text-anchor="middle" fill="#8b949e" font-size="11">AWS_ENDPOINT_URL = http://&lt;KONG_IP&gt;:8000</text>

  <!-- Arrow: Claude Code → Kong -->
  <line x1="430" y1="156" x2="430" y2="182" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="173" fill="#8b949e" font-size="10">HTTPS / OpenAI API</text>

  <!-- ── AWS Cloud 영역 ── -->
  <rect x="40" y="186" width="780" height="456" rx="10" fill="none" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="56" y="204" fill="#6e7681" font-size="11">AWS Cloud (VPC / ECS Fargate)</text>

  <!-- ── ECS Task 영역 ── -->
  <rect x="60" y="210" width="740" height="320" rx="8" fill="none" stroke="#21262d" stroke-width="1.5"/>
  <text x="76" y="226" fill="#484f58" font-size="10">ECS Fargate Task  (2 vCPU / 8 GB)</text>

  <!-- ── Kong box ── -->
  <rect x="80" y="234" width="700" height="130" rx="8" fill="url(#kongGrad)" stroke="#3d6b9e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="430" y="257" text-anchor="middle" fill="#90cdf4" font-size="14" font-weight="700">Kong AI Gateway</text>
  <text x="430" y="273" text-anchor="middle" fill="#6e7681" font-size="11">port 8000 (proxy)  ·  port 8001 (admin)</text>

  <!-- Kong plugin tags -->
  <rect x="100" y="283" width="80" height="22" rx="11" fill="#1d4ed8" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="298" text-anchor="middle" fill="#93c5fd" font-size="11">key-auth</text>
  <rect x="192" y="283" width="100" height="22" rx="11" fill="#065f46" fill-opacity="0.3" stroke="#10b981" stroke-width="1"/>
  <text x="242" y="298" text-anchor="middle" fill="#6ee7b7" font-size="11">rate-limiting</text>
  <rect x="304" y="283" width="140" height="22" rx="11" fill="#5b21b6" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="1"/>
  <text x="374" y="298" text-anchor="middle" fill="#c4b5fd" font-size="11">request-transformer</text>
  <rect x="456" y="283" width="110" height="22" rx="11" fill="#7c2d12" fill-opacity="0.3" stroke="#f97316" stroke-width="1"/>
  <text x="511" y="298" text-anchor="middle" fill="#fdba74" font-size="11">ai-mcp-proxy</text>

  <!-- Kong routes -->
  <rect x="100" y="315" width="200" height="20" rx="4" fill="#0d1117" fill-opacity="0.5"/>
  <text x="110" y="329" fill="#8b949e" font-size="10">POST /v1/chat/completions</text>
  <text x="306" y="329" fill="#3fb950" font-size="10"> → key-auth 적용</text>

  <rect x="100" y="340" width="200" height="20" rx="4" fill="#0d1117" fill-opacity="0.5"/>
  <text x="110" y="354" fill="#8b949e" font-size="10">POST /model/{id}/invoke</text>
  <text x="306" y="354" fill="#e3b341" font-size="10"> → 패스스루 (AWS SigV4)</text>

  <rect x="530" y="315" width="120" height="20" rx="4" fill="#0d1117" fill-opacity="0.5"/>
  <text x="540" y="329" fill="#8b949e" font-size="10">GET/POST /mcp</text>
  <text x="656" y="329" fill="#c4b5fd" font-size="10"> → MCP</text>

  <!-- Arrow: Kong → Guardrails -->
  <line x1="430" y1="364" x2="430" y2="392" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="382" fill="#8b949e" font-size="10">localhost:8080</text>

  <!-- ── Guardrails box ── -->
  <rect x="80" y="396" width="700" height="120" rx="8" fill="url(#guardGrad)" stroke="#2d6a4f" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="430" y="418" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="700">AI Guardrails  (FastAPI + LLM Guard 0.3.14)</text>

  <!-- Input scanners -->
  <text x="110" y="440" fill="#8b949e" font-size="11" font-weight="600">Input:</text>
  <rect x="145" y="428" width="72" height="20" rx="10" fill="#7c2d12" fill-opacity="0.4" stroke="#ef4444" stroke-width="1"/>
  <text x="181" y="442" text-anchor="middle" fill="#fca5a5" font-size="10">Anonymize</text>
  <rect x="224" y="428" width="98" height="20" rx="10" fill="#7c2d12" fill-opacity="0.4" stroke="#ef4444" stroke-width="1"/>
  <text x="273" y="442" text-anchor="middle" fill="#fca5a5" font-size="10">PromptInjection</text>
  <rect x="329" y="428" width="62" height="20" rx="10" fill="#7c2d12" fill-opacity="0.4" stroke="#ef4444" stroke-width="1"/>
  <text x="360" y="442" text-anchor="middle" fill="#fca5a5" font-size="10">Toxicity</text>
  <rect x="398" y="428" width="72" height="20" rx="10" fill="#1d4ed8" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <text x="434" y="442" text-anchor="middle" fill="#93c5fd" font-size="10">TokenLimit</text>
  <rect x="477" y="428" width="72" height="20" rx="10" fill="#065f46" fill-opacity="0.3" stroke="#10b981" stroke-width="1"/>
  <text x="513" y="442" text-anchor="middle" fill="#6ee7b7" font-size="10">BanTopics</text>
  <rect x="556" y="428" width="86" height="20" rx="10" fill="#065f46" fill-opacity="0.3" stroke="#10b981" stroke-width="1"/>
  <text x="599" y="442" text-anchor="middle" fill="#6ee7b7" font-size="10">BanSubstrings</text>

  <!-- Output scanners -->
  <text x="110" y="472" fill="#8b949e" font-size="11" font-weight="600">Output:</text>
  <rect x="155" y="460" width="88" height="20" rx="10" fill="#1d4ed8" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <text x="199" y="474" text-anchor="middle" fill="#93c5fd" font-size="10">Deanonymize</text>
  <rect x="250" y="460" width="68" height="20" rx="10" fill="#7c2d12" fill-opacity="0.4" stroke="#ef4444" stroke-width="1"/>
  <text x="284" y="474" text-anchor="middle" fill="#fca5a5" font-size="10">Sensitive</text>

  <text x="500" y="474" fill="#8b949e" font-size="11">PII 마스킹 → 전달 → 응답 시 복원</text>

  <!-- Blocked tag -->
  <rect x="600" y="460" width="160" height="20" rx="4" fill="#450a0a" fill-opacity="0.6" stroke="#dc2626" stroke-width="1"/>
  <text x="680" y="474" text-anchor="middle" fill="#fca5a5" font-size="10">score &gt; threshold → 400 차단</text>

  <!-- ── Outter ECS area description ── -->
  <text x="430" y="555" text-anchor="middle" fill="#484f58" font-size="10">IAM Task Role (AWS SigV4 자동 서명)</text>

  <!-- Arrow: Guardrails → Bedrock -->
  <line x1="430" y1="516" x2="430" y2="548" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- ── Bedrock box ── -->
  <rect x="180" y="556" width="500" height="64" rx="8" fill="url(#bedrockGrad)" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="430" y="580" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="700">AWS Bedrock</text>
  <text x="430" y="598" text-anchor="middle" fill="#8b949e" font-size="11">us.anthropic.claude-sonnet-4-6-20250514-v1:0  (Cross-region Inference)</text>

  <!-- Arrow: Bedrock → response back -->
  <path d="M 700 588 Q 790 588 790 450 Q 790 330 760 330" stroke="#6e7681" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  <text x="798" y="460" fill="#484f58" font-size="10" transform="rotate(-90 798 460)">응답 반환</text>

  <!-- ── CloudWatch row ── -->
  <rect x="60" y="630" width="740" height="44" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="430" y="648" text-anchor="middle" fill="#6e7681" font-size="11">CloudWatch Logs</text>
  <text x="170" y="665" text-anchor="middle" fill="#58a6ff" font-size="10">/ecs/.../kong</text>
  <text x="310" y="665" text-anchor="middle" fill="#3fb950" font-size="10">/ecs/.../guardrails</text>
  <text x="490" y="665" text-anchor="middle" fill="#e3b341" font-size="10">Bedrock CloudTrail</text>
  <text x="660" y="665" text-anchor="middle" fill="#c4b5fd" font-size="10">S3 → Athena / SIEM</text>

  <!-- Arrow: Bedrock → CloudWatch -->
  <line x1="430" y1="620" x2="430" y2="630" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowGray)"/>
</svg>
