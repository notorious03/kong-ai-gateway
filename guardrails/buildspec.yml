version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPO_URI
  build:
    commands:
      - echo Building Guardrails image...
      - docker build -t ai-guardrails:latest .
      - docker tag ai-guardrails:latest $ECR_REPO_URI:latest
      - docker tag ai-guardrails:latest $ECR_REPO_URI:$CODEBUILD_BUILD_NUMBER
  post_build:
    commands:
      - echo Pushing to ECR...
      - docker push $ECR_REPO_URI:latest
      - docker push $ECR_REPO_URI:$CODEBUILD_BUILD_NUMBER
      - echo Build completed on `date`
